# Netlify configuration for the JARVIS app.
#
# Architecture: a statically-exported Next.js front-end (published from `out/`)
# plus a standalone streaming Netlify Function (netlify/functions/chat.mjs)
# mapped to /api/chat. No Next.js server runtime — rock-solid on Netlify.
#
# Set the site's "Base directory" to `jarvis`. Add ANTHROPIC_API_KEY in the
# site's environment variables.

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
